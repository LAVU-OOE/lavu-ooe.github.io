<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PWA Install Button – Demo</title>

  <!-- 1️⃣ Include the PWA Button CSS -->
  <link rel="stylesheet" href="../css/pwa-install-button.css">

  <!-- 2️⃣ Demo page styles (optional, for better presentation) -->
  <style>
    body {
      font-family: system-ui, -apple-system, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
      background: #f5f7fb;
      padding: 20px;
    }
    .card {
      background: #ffffff;
      padding: 2.5rem;
      border-radius: 24px;
      box-shadow: 0 8px 30px rgba(0, 0, 0, 0.08);
      text-align: center;
      max-width: 450px;
      width: 100%;
    }
    .card h1 {
      margin-top: 0;
      font-weight: 600;
      color: #1a1a1a;
    }
    .card p {
      color: #555;
      line-height: 1.6;
      margin-bottom: 2rem;
    }
    #pwa-install-container {
      display: flex;
      justify-content: center;
    }

    /* 3️⃣ Optional: override button styles via CSS variables */
    :root {
      --pwa-btn-bg: #2d7d46;
      --pwa-btn-radius: 30px;
      --pwa-btn-padding: 14px 28px;
      --pwa-btn-font-size: 1.05rem;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>🚀 PWA Install Button</h1>
    <p>
      This is a standalone demo of the install button.<br>
      It adapts automatically to the current installation state.
    </p>

    <!-- 👇 The container where the button will be rendered -->
    <div id="pwa-install-container"></div>

    <p style="margin-top: 1.5rem; font-size: 0.8rem; color: #999;">
      Display mode: <span id="display-mode">checking…</span>
    </p>
  </div>

  <!-- 4️⃣ Include the PWA Button JavaScript -->
  <script src="../js/pwa-install-button.js"></script>

  <!-- 5️⃣ Optional: show current display mode for demo purposes -->
  <script>
    function updateDisplayMode() {
      const isStandalone = window.matchMedia('(display-mode: standalone)').matches ||
                           window.navigator.standalone === true;
      document.getElementById('display-mode').textContent = isStandalone ? '✅ Standalone (PWA)' : '🌐 Browser';
    }
    updateDisplayMode();
    window.addEventListener('load', updateDisplayMode);
    window.addEventListener('visibilitychange', updateDisplayMode);
  </script>
</body>
</html>
